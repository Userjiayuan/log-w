<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>风景图库 · 欢迎</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="gallery-card">
        <p class="brand">CLOUD RIM</p>
        <h1>欢迎回来</h1>
        <p>你已成功登录，可以继续浏览风景图库与精选合集。</p>
        <p class="user-info" id="user-info">正在加载账号信息...</p>
        <form method="post" action="http://13.212.50.137:3000/api/logout">
          <button class="secondary" type="submit">退出登录</button>
        </form>
      </section>
      <aside class="scenic-panel" aria-label="风景精选">
        <div class="scenic-copy">
          <p class="eyebrow">今日推荐</p>
          <h2>峡谷与潮汐的清晨</h2>
          <p>探索热门合集：高山、海岸、城市天际线与雨后森林。</p>
        </div>
        <div class="scenic-grid" role="presentation">
          <div class="tile tile-a"></div>
          <div class="tile tile-b"></div>
          <div class="tile tile-c"></div>
          <div class="tile tile-d"></div>
        </div>
      </aside>
    </main>
    <script>
      const userInfo = document.getElementById("user-info");

      fetch("http://13.212.50.137:3000/api/me", { credentials: "include" })
        .then((response) => response.json())
        .then((data) => {
          if (!data.ok || !data.user) {
            userInfo.textContent = "未登录";
            return;
          }
          userInfo.textContent = `已登录：${data.user.displayName} (${data.user.email})`;
        })
        .catch(() => {
          userInfo.textContent = "无法获取账号信息";
        });
    </script>
  </body>
</html>
