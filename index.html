<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>山野风景图库 · 登录</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="login-card" aria-labelledby="login-title">
        <header class="card-header">
          <p class="brand">CLOUD RIM</p>
          <h1 id="login-title">登录进入风景图片馆</h1>
          <p class="subtitle">收藏山野、海岸与森林光影。</p>
        </header>

        <form class="login-form" method="post" action="/api/login">
          <label class="field">
            <span>邮箱</span>
            <input type="email" name="email" placeholder="name@example.com" required />
          </label>

          <label class="field">
            <span>密码</span>
            <input type="password" name="password" placeholder="至少 8 位" required />
          </label>

          <div class="row">
            <label class="checkbox">
              <input type="checkbox" name="remember" />
              <span>记住我</span>
            </label>
            <a class="link" href="#">忘记密码？</a>
          </div>

          <button class="primary" type="submit">进入图库</button>
        </form>

        <footer class="card-footer">
          <p>还没有账号？<a class="link" href="#">创建一个</a></p>
        </footer>
      </section>

      <aside class="scenic-panel" aria-label="风景精选">
        <div class="scenic-copy">
          <p class="eyebrow">本周精选</p>
          <h2>沿着晨雾去旅行</h2>
          <p>浏览 4K 风景与航拍图库，按地点与光线筛选最适合的壁纸与灵感。</p>
        </div>
        <div class="scenic-grid" role="presentation">
          <div class="tile tile-a"></div>
          <div class="tile tile-b"></div>
          <div class="tile tile-c"></div>
          <div class="tile tile-d"></div>
        </div>
      </aside>
    </main>
  </body>
</html>
